AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Application Load Balancer with ACM SSL/TLS certificate for the Secure Employee Directory.
  Terminates HTTPS on port 443, forwards to EC2 on port 5000.
  HTTP on port 80 is redirected to HTTPS automatically.
  Uses Route 53 for automated DNS validation and domain management.
  Depends on the EC2/IAM stack for the instance ID and security group.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - production
    Description: Deployment environment tag

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID — must match the VPC used in the EC2/IAM stack

  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet ID — ALB requires at least two AZs

  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet ID in a different AZ from Subnet1

  Ec2InstanceId:
    Type: String
    Description: EC2 instance ID from the EC2/IAM stack outputs (AppInstance)

  Ec2SecurityGroupId:
    Type: String
    Description: Security group ID from the EC2/IAM stack — ALB SG will be added as an inbound source

  DomainName:
    Type: String
    Description: >
      Fully qualified domain name for the app (e.g. employees.yourdomain.com).
      Must be a domain you control in Route 53.

  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for the domain. Used for automated DNS validation and ALB alias record.

  AppPort:
    Type: Number
    Default: 5000
    Description: Port the Flask app listens on — must match the EC2/IAM stack AppPort

  CreateAliasRecord:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Whether to create a Route 53 alias record pointing to the ALB

Resources:

  # -----------------------------------------------------------------
  # ACM Certificate — DNS validated automatically via Route 53
  # -----------------------------------------------------------------
  AppCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # ALB Security Group — accepts port 80 and 443 from anywhere
  # EC2 only accepts traffic from this SG (enforced by Ec2IngressFromAlb)
  # -----------------------------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — allow HTTP and HTTPS from the internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP — redirected to HTTPS
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS — TLS terminated here
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: ALB outbound to EC2
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-secure-employee-directory-alb-sg"
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # Ingress rule on the existing EC2 SG — allow only from the ALB SG
  # Locks down direct access to port 5000 from the internet
  # -----------------------------------------------------------------
  Ec2IngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref Ec2SecurityGroupId
      IpProtocol: tcp
      FromPort: !Ref AppPort
      ToPort: !Ref AppPort
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: Allow traffic on app port from ALB SG only

  # -----------------------------------------------------------------
  # Application Load Balancer — internet-facing, dual-AZ
  # -----------------------------------------------------------------
  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${Environment}-secure-employee-directory-alb"
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # Target Group — health check uses /health/ready per app contract
  # -----------------------------------------------------------------
  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Environment}-secure-employee-directory-tg"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref AppPort
      TargetType: instance
      Targets:
        - Id: !Ref Ec2InstanceId
          Port: !Ref AppPort
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health/ready
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # HTTPS Listener — port 443, TLS 1.2+ enforced
  # -----------------------------------------------------------------
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AppCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup
      DependsOn:
        - AppCertificate
        - AppTargetGroup

  # -----------------------------------------------------------------
  # HTTP Listener — port 80, permanent redirect to HTTPS
  # -----------------------------------------------------------------
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # -----------------------------------------------------------------
  # Route 53 Alias Record — points domain to ALB (optional)
  # -----------------------------------------------------------------
  AppAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreateAliasRecordCondition
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt AppLoadBalancer.DNSName
        HostedZoneId: !GetAtt AppLoadBalancer.CanonicalHostedZoneID
      Comment: !Sub "Alias record for ${Environment} secure-employee-directory ALB"

Conditions:
  CreateAliasRecordCondition:
    !Equals [!Ref CreateAliasRecord, "true"]

Outputs:
  AlbDnsName:
    Description: ALB DNS name — point your domain CNAME here
    Value: !GetAtt AppLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-AlbDnsName"

  AlbHostedZoneId:
    Description: ALB canonical hosted zone ID — used for Route 53 alias A records
    Value: !GetAtt AppLoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub "${AWS::StackName}-AlbHostedZoneId"

  AlbArn:
    Description: ALB ARN
    Value: !Ref AppLoadBalancer
    Export:
      Name: !Sub "${AWS::StackName}-AlbArn"

  TargetGroupArn:
    Description: Target group ARN
    Value: !Ref AppTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}-TargetGroupArn"

  CertificateArn:
    Description: ACM certificate ARN
    Value: !Ref AppCertificate
    Export:
      Name: !Sub "${AWS::StackName}-CertificateArn"

  HttpsUrl:
    Description: HTTPS URL — accessible after DNS propagation and cert validation
    Value: !Sub "https://${DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-HttpsUrl"

  AlbSecurityGroupId:
    Description: ALB security group ID
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-AlbSecurityGroupId"

  DomainValidationStatus:
    Description: Status of certificate domain validation
    Value: !GetAtt AppCertificate.DomainValidationOptions