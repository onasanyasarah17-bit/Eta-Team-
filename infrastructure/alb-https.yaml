AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Application Load Balancer with ACM SSL/TLS certificate for the Secure Employee Directory.
  Terminates HTTPS on port 443 and forwards plain HTTP to the EC2 instance on port 5000.
  HTTP port 80 redirects to HTTPS with a 301.
  Depends on the EC2/IAM stack for the instance ID and security group ID.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - production
    Description: Deployment environment tag - applied to all resource tags

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID - must be the same VPC used in the EC2/IAM stack

  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet - ALB requires subnets in at least two AZs

  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet in a different AZ from PublicSubnet1Id

  Ec2InstanceId:
    Type: String
    Description: >
      EC2 instance ID from the EC2/IAM stack (Outputs.InstanceId).
      Example: i-0abc1234567890def

  Ec2SecurityGroupId:
    Type: String
    Description: >
      Security group ID from the EC2/IAM stack (Outputs.SecurityGroupId).
      The ALB security group will be added as the sole allowed inbound source
      on AppPort, replacing the open 0.0.0.0/0 rule.

  DomainName:
    Type: String
    Default: employees.pcons.me
    Description: >
      Fully qualified domain name for the app (e.g. employees.pcons.me).
      Must be a domain you control. ACM validates it via a DNS CNAME record
      you add to your DNS provider (see Step 4 in docs/alb-https-handoff.md).

  AppPort:
    Type: Number
    Default: 5000
    Description: >
      Port the Flask/Gunicorn app listens on inside the EC2 instance.
      Must match the AppPort parameter used in the EC2/IAM stack (default 5000).

Resources:

  # -----------------------------------------------------------------
  # ACM Certificate (DNS validated)
  # The stack pauses at CREATE_IN_PROGRESS here until the CNAME is
  # added. See Step 4 in docs/alb-https-handoff.md.
  # -----------------------------------------------------------------
  AppCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # ALB Security Group
  # Accepts HTTP (80) and HTTPS (443) from anywhere.
  # EC2 is locked to only accept traffic from this SG on AppPort.
  # -----------------------------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AWS::StackName} - ALB inbound HTTP and HTTPS"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP - redirected to HTTPS by the listener
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS - TLS terminated at the ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: ALB outbound to EC2 target
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb-sg"
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # Ingress rule on the existing EC2 security group
  # Allows AppPort traffic from the ALB SG only.
  # NOTE: The old 0.0.0.0/0 rule on AppPort must be removed manually
  # from the EC2 SG after this stack deploys (see Troubleshooting).
  # -----------------------------------------------------------------
  Ec2IngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref Ec2SecurityGroupId
      IpProtocol: tcp
      FromPort: !Ref AppPort
      ToPort: !Ref AppPort
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: Allow app port traffic from ALB SG only

  # -----------------------------------------------------------------
  # Application Load Balancer (internet-facing, dual-AZ)
  # -----------------------------------------------------------------
  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}"
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # Target Group
  # Health check uses /health/ready - returns 200 when DynamoDB is
  # reachable, 503 when not (correctly pulls instance out of rotation).
  # Use /health/live for process-only liveness probes.
  # -----------------------------------------------------------------
  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref AppPort
      TargetType: instance
      Targets:
        - Id: !Ref Ec2InstanceId
          Port: !Ref AppPort
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health/ready
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # -----------------------------------------------------------------
  # HTTPS Listener (port 443)
  # TLS terminated here using the ACM certificate.
  # Policy enforces TLS 1.2 minimum, prefers TLS 1.3.
  # -----------------------------------------------------------------
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AppCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  # -----------------------------------------------------------------
  # HTTP Listener (port 80)
  # Permanently redirects to HTTPS (301). Browsers cache this.
  # -----------------------------------------------------------------
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

Outputs:
  AlbDnsName:
    Description: ALB DNS name - create a CNAME (or Route 53 alias A record) pointing your domain here
    Value: !GetAtt AppLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-AlbDnsName"

  AlbHostedZoneId:
    Description: ALB canonical hosted zone ID - used when creating Route 53 alias A records
    Value: !GetAtt AppLoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub "${AWS::StackName}-AlbHostedZoneId"

  AlbArn:
    Description: ALB ARN
    Value: !Ref AppLoadBalancer
    Export:
      Name: !Sub "${AWS::StackName}-AlbArn"

  TargetGroupArn:
    Description: Target group ARN
    Value: !Ref AppTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}-TargetGroupArn"

  CertificateArn:
    Description: ACM certificate ARN
    Value: !Ref AppCertificate
    Export:
      Name: !Sub "${AWS::StackName}-CertificateArn"

  HttpsUrl:
    Description: HTTPS URL - accessible after DNS propagation and ACM validation
    Value: !Sub "https://${DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-HttpsUrl"

  AlbSecurityGroupId:
    Description: ALB security group ID
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-AlbSecurityGroupId"
