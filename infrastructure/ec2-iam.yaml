AWSTemplateFormatVersion: "2010-09-09"
Description: >
  EC2 instance, security group, and least-privilege IAM role/instance profile
  for the Secure Employee Directory. Deploys into an existing VPC/subnet.
  The Flask app authenticates to DynamoDB via the instance profile — no access keys.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - production
    Description: Deployment environment tag

  DynamoDBTableArn:
    Type: String
    Description: ARN of the secure-employees DynamoDB table (from DynamoDB stack outputs)

  TableName:
    Type: String
    Default: secure-employees
    Description: DynamoDB table name used by the Flask app and seed script

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: Ubuntu 22.04 LTS AMI — resolved automatically via SSM

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID to deploy the instance into

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Existing public subnet ID in the VPC (must auto-assign public IPs or have IGW route)

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name for SSH access

  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH (restrict to your IP/32 for demos when possible)
    MinLength: 9
    MaxLength: 18
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type (t2.micro is not available in eu-north-1)

  AppPort:
    Type: Number
    Default: 5000
    Description: Flask/Gunicorn listen port

  GitRepoUrl:
    Type: String
    Default: https://github.com/onasanyasarah17-bit/Eta-Team-.git
    Description: Public Git repository to clone onto the instance

  GitBranch:
    Type: String
    Default: belinda-backend
    Description: Git branch that contains the Flask backend

Resources:
  EmployeeDirectoryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "secure-employee-directory-ec2-role-${AWS::StackName}"
      Description: Allows EC2 to access only the secure-employees DynamoDB table
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDBRuntimeAccess
                Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:DescribeTable
                Resource: !Ref DynamoDBTableArn
              - Sid: DynamoDBSeedAccess
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                Resource: !Ref DynamoDBTableArn
      Tags:
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  EmployeeDirectoryInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "secure-employee-directory-profile-${AWS::StackName}"
      Roles:
        - !Ref EmployeeDirectoryRole

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound traffic on app port and SSH
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          CidrIp: 0.0.0.0/0
          Description: Flask app access
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Outbound for package installs and AWS API calls
      Tags:
        - Key: Name
          Value: secure-employee-directory-sg
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref EmployeeDirectoryInstanceProfile
      KeyName: !Ref KeyPairName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: "0"
          GroupSet:
            - !Ref AppSecurityGroup
          SubnetId: !Ref SubnetId
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/secure-employee-directory-bootstrap.log) 2>&1

          apt-get update -y
          apt-get install -y git python3 python3-pip python3-venv

          mkdir -p /opt/secure-employee-directory
          cd /opt/secure-employee-directory
          git clone --branch ${GitBranch} --single-branch ${GitRepoUrl} app
          cd app

          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          cat >/etc/systemd/system/secure-employee-directory.service <<UNIT
          [Unit]
          Description=Secure Employee Directory Flask App
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/secure-employee-directory/app
          Environment=FLASK_ENV=production
          Environment=AWS_REGION=eu-north-1
          Environment=AWS_DEFAULT_REGION=eu-north-1
          Environment=DYNAMODB_TABLE_NAME=${TableName}
          Environment=HOST=0.0.0.0
          Environment=PORT=${AppPort}
          Environment=SECRET_KEY=change-me-after-demo
          ExecStart=/opt/secure-employee-directory/app/.venv/bin/gunicorn --bind 0.0.0.0:${AppPort} --workers 2 run:app
          Restart=always
          RestartSec=5
          User=root

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable secure-employee-directory
          systemctl start secure-employee-directory

          # Seed sample employees (safe to re-run; overwrites same keys)
          . .venv/bin/activate
          python scripts/populate_table.py || true
      Tags:
        - Key: Name
          Value: secure-employee-directory-app
        - Key: Project
          Value: secure-employee-directory
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Authentication
          Value: IAM-Instance-Profile

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref AppInstance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  InstancePublicIp:
    Description: Public IP of the EC2 instance
    Value: !GetAtt AppInstance.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIp"

  InstancePublicDns:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt AppInstance.PublicDnsName
    Export:
      Name: !Sub "${AWS::StackName}-PublicDns"

  AppUrl:
    Description: Flask app URL
    Value: !Sub "http://${AppInstance.PublicIp}:${AppPort}/"
    Export:
      Name: !Sub "${AWS::StackName}-AppUrl"

  HealthUrl:
    Description: Health check URL (should report IAM Role authentication)
    Value: !Sub "http://${AppInstance.PublicIp}:${AppPort}/health"

  SecurityGroupId:
    Description: Security group ID
    Value: !Ref AppSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

  IamRoleArn:
    Description: ARN of the IAM Role attached to the EC2 instance
    Value: !GetAtt EmployeeDirectoryRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IamRoleArn"
